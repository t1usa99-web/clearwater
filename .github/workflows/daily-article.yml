name: Generate Daily Article

on:
  schedule:
    - cron: '0 9 * * *'   # 9:00 AM UTC every day
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push new article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          # Only commit if articles.json actually changed
          if git diff --staged --quiet; then
            echo "No new article generated (all topics published). Skipping commit."
          else
            git commit -m "Add daily article: $(date +%Y-%m-%d)"
            git push
            echo "Article committed and pushed. Railway will auto-deploy."
          fi
